# Video Generator 配置文件

# 视频编码参数
video:
  codec: "libx264"
  crf: 18
  preset: "ultrafast"
  fps: 30

# 音频编码参数
audio:
  codec: "aac"
  bitrate: "192k"
  sample_rate: 44100
  channels: 2

# 默认输出比例
default_ratio: "9:16"  # 可选: "16:9", "1:1", "4:5"

# 转场效果
transition:
  enabled: true
  type: "black"        # 黑屏过渡
  duration: 0.5         # 秒

# 标题页默认配置
title:
  default_tag: "干货教学"
  default_channel: "@你的频道名"

# FFmpeg 路径（可选，不设置则自动检测）
# ffmpeg_path: "C:/ffmpeg/bin/ffmpeg.exe"
